<div style="height: 100%;" class="bgcolor_tranp ">
    <div style="float: center;" class="h_scroll">
        <infors #infors></infors>
    </div>
    <div style="float: left; " class="bgcolor_tranp00 ">
        <app-menu></app-menu>


    </div>

    <div style="float: left; text-align: center;" class="bgcolor_tranp00 " (click)="showCalendar()">
        {{dateStr}} <br> {{timeStr}}
    </div>


    <div style="float: right; " class="bgcolor_tranp00">
        <nav class="navbar navbar-expand-md navbar-dark right ">
            <div *ngIf="isLoggedIn(); then UserConnected else UserNotConnected"></div>
        </nav>
        <ng-template #UserConnected>

            <div class="bgcolor_tranp00">
                <button type="button" class="btn btn-light" id="dropdown02" data-toggle="dropdown" aria-haspopup="true">
          {{title0}} <span  class="badge badge-pill badge-danger">{{getNbNotifications()}}</span>
        </button>

                <div class="dropdown-menu h_scroll bgcolor_tranp00" aria-labelledby="dropdown02">
                    <app-notification [isOnlyNotViewed]="true" [isShowBtns]="false" idPagination="idPaginationNotViewed" #notificationCompo></app-notification>
                    <a class="btn btn-primary title100pct" (click)="showNotificationsAll()">
                        <h5>Voir toutes les notifications</h5>
                    </a>
                </div>

            </div>

            <div style="text-align: center;" class="pcoded-micon" (click)="menuUserConnected()"><i class="feather icon-settings"></i> {{getEsnCurrentName() | uppercase }}
                <br> {{getCurentUserName() | titlecase}}
                <br>
            </div>
        </ng-template>


        <ng-template #UserNotConnected>
            <a routerLink="/login" class="btn btn-auth-gen">LOGIN</a>
        </ng-template>


    </div>

    <div style="float: right;">
        <div *ngIf="isLoggedIn()">
            <a class="nav-link dropdown-toggle" id="dropdown01" data-toggle="dropdown" aria-haspopup="true" aria-expanded="true">{{language | uppercase}}</a>
            <div class="dropdown-menu" aria-labelledby="dropdown01">
                <a class="dropdown-item" (click)="changeLanguage('en')"><span class="flag-icon flag-icon-us"> </span> EN</a>
                <a class="dropdown-item" (click)="changeLanguage('fr')"><span class="flag-icon flag-icon-fr"> </span> FR</a>
            </div>
        </div>
    </div>



</div>
